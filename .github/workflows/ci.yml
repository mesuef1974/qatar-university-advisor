# ======================================================
# خط أنابيب التكامل المستمر (CI Pipeline)
# المشروع: Qatar University Advisor
# الوصف: يتحقق من جودة الكود عند كل push أو pull request
# ======================================================

name: CI - تكامل مستمر

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------
  # وظيفة البناء والتحقق من الجودة
  # ---------------------------------------------------
  build-and-lint:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      # الخطوة 1: استنساخ الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # الخطوة 2: إعداد بيئة Node.js الإصدار 20
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # الخطوة 3: تثبيت الحزم مع الاستفادة من الـ cache
      - name: Install dependencies
        run: npm install --prefer-offline

      # الخطوة 4: فحص جودة الكود باستخدام ESLint
      - name: Lint code
        run: npm run lint

      # الخطوة 5: تشغيل الاختبارات الآلية
      - name: Run Tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-key-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          WHATSAPP_TOKEN: test-token
          WEBHOOK_SECRET: test-secret

      # الخطوة 6: التحقق من تغطية الاختبارات
      - name: Check Test Coverage
        run: npm run test:coverage 2>/dev/null || echo "Coverage report skipped (no config)"
        continue-on-error: true
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-key-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          WHATSAPP_TOKEN: test-token
          WEBHOOK_SECRET: test-secret

      # الخطوة 7: بناء المشروع للتأكد من عدم وجود أخطاء
      - name: Build project
        run: npm run build
