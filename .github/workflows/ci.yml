# ======================================================
# CI-001: خط أنابيب التكامل المستمر المُحسَّن
# المشروع: Qatar University Advisor
# التغييرات: + npm audit | + develop branch | - continue-on-error
# شركة أذكياء للبرمجيات | 2026-04-04
# ======================================================

name: CI — تكامل مستمر

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ---------------------------------------------------
  # 1. الفحص الأمني — يجب أن ينجح أولاً
  # ---------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: npm audit — فحص الثغرات الأمنية
        run: npm audit --audit-level=moderate
        # أي ثغرة moderate فأعلى تُوقف البناء — INC-2026-001 لن يتكرر

  # ---------------------------------------------------
  # 2. البناء والجودة — بعد نجاح الأمان
  # ---------------------------------------------------
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Lint code
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-key-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          WHATSAPP_TOKEN: test-token
          WEBHOOK_SECRET: test-secret

      - name: Check Test Coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-key-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          WHATSAPP_TOKEN: test-token
          WEBHOOK_SECRET: test-secret
        # CI-001: حُذف continue-on-error — فشل Coverage يوقف البناء

      - name: Build project
        run: npm run build
