<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — المرشد الأكاديمي</title>
  <meta name="theme-color" content="#1a56db">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      text-align: center;
      color: #1f2937;
      padding: 1rem;
    }
    .container {
      padding: 2.5rem 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      width: 100%;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      line-height: 1;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
      color: #111827;
    }
    p {
      color: #6b7280;
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    button {
      padding: 0.75rem 2rem;
      background: #1a56db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover, button:focus-visible {
      background: #1e40af;
    }
    button:active {
      transform: scale(0.98);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #9ca3af;
      margin-top: 1.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container" role="alert" aria-live="assertive">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>المرشد الأكاديمي يحتاج اتصالاً بالإنترنت للعمل. تحقق من اتصالك وحاول مجدداً.</p>
    <div class="actions">
      <button onclick="window.location.reload()">إعادة المحاولة</button>
    </div>
    <div class="status">
      <span class="dot"></span>
      <span>غير متصل</span>
    </div>
  </div>

  <script>
    // Auto-reload when connectivity is restored
    window.addEventListener('online', function () {
      window.location.reload();
    });
  </script>
</body>
</html>
