<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="مُرشدي - Qatar University Advisor">
  <title>مُرشدي — Qatar University Advisor</title>
  <desc>Astrolabe-inspired logo: compass circle with an 8-point North Star and a warm center point, symbolising academic guidance grounded in Islamic scientific heritage.</desc>

  <!-- Outer compass circle -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#156082" stroke-width="4"/>

  <!-- Mid celestial ring (dashed, astrolabe plate hint) -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="#156082" stroke-width="1.25" stroke-dasharray="2 5" opacity="0.45"/>

  <!-- Inner guide ring -->
  <circle cx="128" cy="128" r="82" fill="none" stroke="#156082" stroke-width="1" opacity="0.35"/>

  <!-- Radial axes (cardinal) -->
  <g stroke="#156082" stroke-width="1.25" opacity="0.35">
    <line x1="128" y1="22"  x2="128" y2="42"/>
    <line x1="128" y1="214" x2="128" y2="234"/>
    <line x1="22"  y1="128" x2="42"  y2="128"/>
    <line x1="214" y1="128" x2="234" y2="128"/>
  </g>

  <!-- Cardinal tick marks (N/E/S/W) -->
  <g fill="#156082">
    <circle cx="128" cy="18"  r="4.5"/>
    <circle cx="128" cy="238" r="4.5"/>
    <circle cx="18"  cy="128" r="4.5"/>
    <circle cx="238" cy="128" r="4.5"/>
  </g>

  <!-- Ordinal tick marks (NE/SE/SW/NW) -->
  <g fill="#156082" opacity="0.55">
    <circle cx="206" cy="50"  r="2.75"/>
    <circle cx="206" cy="206" r="2.75"/>
    <circle cx="50"  cy="206" r="2.75"/>
    <circle cx="50"  cy="50"  r="2.75"/>
  </g>

  <!-- 8-point outer star (astrolabe rete) -->
  <polygon
    points="128.00,56.00 138.72,102.13 178.91,77.09 153.87,117.28 200.00,128.00 153.87,138.72 178.91,178.91 138.72,153.87 128.00,200.00 117.28,153.87 77.09,178.91 102.13,138.72 56.00,128.00 102.13,117.28 77.09,77.09 117.28,102.13"
    fill="#156082" stroke="#0E2841" stroke-width="1.25" stroke-linejoin="miter"/>

  <!-- 8-point inner star, rotated 11.25° to nest between outer points -->
  <polygon
    points="135.02,92.69 135.78,116.36 157.93,108.00 141.73,125.27 163.31,135.02 139.64,135.78 148.00,157.93 130.73,141.73 120.98,163.31 120.22,139.64 98.07,148.00 114.27,130.73 92.69,120.98 116.36,120.22 108.00,98.07 125.27,114.27"
    fill="#E97132" opacity="0.92"/>

  <!-- Center dot (guiding light) -->
  <circle cx="128" cy="128" r="7" fill="#FFFFFF"/>
  <circle cx="128" cy="128" r="4" fill="#E97132"/>

  <!-- North indicator: subtle accent triangle above the top point -->
  <path d="M 128,4 L 134,18 L 122,18 Z" fill="#E97132"/>
</svg>
